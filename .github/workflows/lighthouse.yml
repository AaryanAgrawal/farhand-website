name: Lighthouse weekly

on:
  schedule:
    - cron: "0 14 * * 1"  # Monday 14:00 UTC = 10am ET / 7am PT
  workflow_dispatch:

concurrency:
  group: lighthouse
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse
        id: lh
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://farhand.live/
            https://farhand.live/services/robots
            https://farhand.live/services/robots/new-york
            https://farhand.live/for/oems
            https://farhand.live/blog
          configPath: ./.github/lighthouse/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Open issue on regression
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Lighthouse regression — ${new Date().toISOString().slice(0,10)}`;
            const body = `Weekly Lighthouse run failed the assertions in \`.github/lighthouse/lighthouserc.json\`.\n\nSee the workflow run for Lighthouse reports: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["seo", "performance"],
            });
